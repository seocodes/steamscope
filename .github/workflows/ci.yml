name: CI

on:
   push:
   pull_request:

jobs:
   test:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout repo
          uses: actions/checkout@v4

        - name: Install uv
          uses: astral-sh/setup-uv@v2

        - name: Set up Python
          uses: uv python install 3.14

        - name: Install dependencies
          run: uv sync --dev

        - name: Run tests
          run: uv run python -m pytest