<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Steam Discount Analyzer</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap"
    />
    <script src="script.js"></script>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "JetBrains Mono", monospace;
        background: #0d1117;
        color: #c9d1d9;
      }

      main {
        max-width: 800px;
        margin: 0 auto;
        padding: 48px 24px;
      }

      h1 {
        margin: 0 0 24px 0;
        font-size: 28px;
        font-weight: 600;
        letter-spacing: -0.5px;
      }

      form {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      label {
        display: block;
        font-size: 14px;
        color: #8b949e;
        margin-bottom: 8px;
      }

      select,
      input[type="number"] {
        width: 100%;
        padding: 12px 14px;
        background: #0d1117;
        color: #c9d1d9;
        border: 1px solid #30363d;
        border-radius: 6px;
        font-size: 14px;
      }

      select:focus,
      input[type="number"]:focus {
        outline: none;
        border-color: #58a6ff;
      }

      button {
        align-self: flex-start;
        padding: 10px 18px;
        border-radius: 6px;
        border: 1px solid #2ea043;
        background: #238636;
        color: #ffffff;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }

      .result {
        margin-top: 28px;
        padding: 16px;
        border: 1px solid #30363d;
        border-radius: 6px;
        color: #c9d1d9;
        min-height: 60px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Steam Discount Analyzer</h1>

      <form method="post" action="/api/advise">
        <div>
          <label for="title">Game Title</label>
          <select id="title" name="title" required>
              <!--AQUI TO USANDO O JINJA2-->
            {% for game in games %}
            <option value="{{ game }}">{{ game }}</option>
            {% endfor %}
          </select>
        </div>

        <div>
          <label for="proposed_price">Proposed Price</label>
          <input
            id="proposed_price"
            name="proposed_price"
            type="number"
            step="0.01"
            min="0"
            inputmode="decimal"
            required
          />
        </div>

        <button type="submit">Analyze Discount</button>
      </form>

      <section class="result" id="result">
        {{ result | default("") }}
      </section>
    </main>
  </body>
</html>
